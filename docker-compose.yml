services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: ./docker/openclaw/Dockerfile
    image: ${OPENCLAW_IMAGE:-titanit_hackathon-openclaw:latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.host.json
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN}
      OLLAMA_API_KEY: ollama-local
    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    command:
      [
        "sh",
        "-lc",
        "find /home/node/.openclaw/browser \\( -name 'SingletonLock' -o -name 'SingletonCookie' -o -name 'SingletonSocket' \\) -exec rm -rf {} + 2>/dev/null || true; exec node dist/index.js gateway --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 120s
    init: true
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://openclaw-gateway:18789}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OPENCLAW_PUBLIC_URL: ${OPENCLAW_PUBLIC_URL:-http://localhost:18789}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      GIGACHAT_BASE_URL: ${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_OAUTH_URL: ${GIGACHAT_OAUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-true}
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./config/openclaw:/app/runtime/openclaw
      - ./data/workspace:/app/runtime/workspace
      - ./artifacts:/app/runtime/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

