services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.host.json
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN}
      OLLAMA_API_KEY: ollama-local
    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 120s
    init: true
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://openclaw-gateway:18789}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OPENCLAW_PUBLIC_URL: ${OPENCLAW_PUBLIC_URL:-http://localhost:18789}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./config/openclaw:/app/runtime/openclaw
      - ./data/workspace:/app/runtime/workspace
      - ./artifacts:/app/runtime/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_started
